<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名鉄 運行情報モニター</title>
    <style>
        :root {
            --meitetsu-red: #CC0000;
            --normal-green: #28a745;
            --alert-red: #d32f2f;
            --ticker-bg: #222;
        }

        html, body { overflow-x: hidden; margin: 0; padding: 0; width: 100%; background-color: #fff; }
        body { font-family: sans-serif; display: flex; flex-direction: column; padding-bottom: 60px; }

        header {
            background-color: var(--meitetsu-red);
            color: white;
            padding: 25px 10px;
            text-align: center;
            font-size: clamp(24px, 7vw, 3rem);
            font-weight: 900;
            border-bottom: 4px solid #ff8f8f;
            white-space: nowrap;
        }

        /* --- 掲示板テロップ（無限ループ版） --- */
        .ticker-container {
            background: var(--ticker-bg);
            color: #fff;
            height: 50px;
            overflow: hidden;
            display: flex;
            border-bottom: 4px solid #444;
        }

        .ticker-label {
            background: #444;
            color: #eee;
            padding: 0 20px;
            display: flex;
            align-items: center;
            font-weight: bold;
            z-index: 10;
        }

        .ticker-scroll {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .ticker-track {
            display: flex;
            white-space: nowrap;
            padding-left: 100%; /* 初期位置 */
            animation: ticker-move 40s linear infinite; /* 40秒に低速化 */
        }

        .ticker-item {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffe600;
            padding-right: 50px;
        }

        @keyframes ticker-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* メイン */
        .main-wrapper { width: 100%; max-width: 1600px; margin: 0 auto; padding: 20px 40px; box-sizing: border-box; }
        .section-title { font-size: 1.6rem; font-weight: bold; border-left: 10px solid #555; padding: 2px 15px; margin-bottom: 15px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .route-card { background: #fff; border-radius: 12px; padding: 20px 10px; text-align: center; border: 3px solid #eee; min-height: 110px; display: flex; flex-direction: column; justify-content: center; transition: transform 0.1s; }
        .route-name { font-size: 1.1rem; font-weight: 900; margin-bottom: 5px; }
        .status-text { font-size: 1rem; font-weight: bold; }
        .status-normal .status-text { color: var(--normal-green); }
        .status-alert { border: 6px solid var(--alert-red) !important; color: var(--alert-red); }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #f1f1f1; display: flex; justify-content: space-between; align-items: center; padding: 10px 40px; box-sizing: border-box; z-index: 100; }
        .flashing { animation: bg-pulse 2s infinite; }
        @keyframes bg-pulse { 0%, 100% { background-color: #fff; } 50% { background-color: #fff9ae; } }
    </style>
</head>
<body>

    <header>名古屋鉄道 運行情報</header>

    <div class="ticker-container">
        <div class="ticker-label">運行詳細</div>
        <div class="ticker-scroll">
            <div id="ticker-track" class="ticker-track">
                <div class="ticker-item" style="color:#fff;">現在、全線で平常通り運転しています。</div>
            </div>
        </div>
    </div>

    <div class="main-wrapper" id="main-content"></div>

    <footer>
        <label style="cursor:pointer;"><input type="checkbox" id="flash-toggle" checked> 背景点滅有効</label>
        <div>最終更新：<span id="time-display">--:--:--</span></div>
    </footer>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxq5skHfV1iYFjXe6Rdn2zUz56LrQvEg2yOzMi8pkB36PBu1eS87lllFBVONTEnrMA9/exec";

        const yahooRouteUrls = {
            "名古屋本線": "https://transit.yahoo.co.jp/diainfo/208/0",
            "豊川線": "https://transit.yahoo.co.jp/diainfo/226/0",
            "西尾線": "https://transit.yahoo.co.jp/diainfo/209/0",
            "蒲郡線": "https://transit.yahoo.co.jp/diainfo/212/0",
            "三河線": "https://transit.yahoo.co.jp/diainfo/210/0",
            "豊田線": "https://transit.yahoo.co.jp/diainfo/211/0",
            "常滑線・空港線": "https://transit.yahoo.co.jp/diainfo/213/0", 
            "河和線": "https://transit.yahoo.co.jp/diainfo/215/0",
            "知多新線": "https://transit.yahoo.co.jp/diainfo/215/0",
            "築港線": "https://transit.yahoo.co.jp/diainfo/214/0",
            "瀬戸線": "https://transit.yahoo.co.jp/diainfo/217/0",
            "津島線・尾西線": "https://transit.yahoo.co.jp/diainfo/201/0", 
            "尾西線": "https://transit.yahoo.co.jp/diainfo/202/0",
            "犬山線": "https://transit.yahoo.co.jp/diainfo/220/0",
            "各務原線": "https://transit.yahoo.co.jp/diainfo/223/0",
            "広見線": "https://transit.yahoo.co.jp/diainfo/221/0",
            "小牧線": "https://transit.yahoo.co.jp/diainfo/218/0",
            "竹鼻線・羽島線": "https://transit.yahoo.co.jp/diainfo/224/0"
        };

        const routes = Object.keys(yahooRouteUrls);
        let isFlashEnabled = true;

        async function updateBoard() {
            const container = document.getElementById("main-content");
            const track = document.getElementById("ticker-track");
            
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                let alertHtml = "";
                let normalHtml = "";
                let alertMessages = [];

                routes.forEach(name => {
                    let status = "平常";
                    if (name === "常滑線・空港線") {
                        status = (data["常滑線"] !== "平常" ? data["常滑線"] : (data["空港線"] !== "平常" ? data["空港線"] : "平常"));
                    } else if (name === "竹鼻線・羽島線") {
                        status = (data["竹鼻線"] !== "平常" ? data["竹鼻線"] : (data["羽島線"] !== "平常" ? data["羽島線"] : "平常"));
                    } else if (name === "津島線・尾西線") {
                        status = (data["津島線"] !== "平常" ? data["津島線"] : (data["尾西線"] !== "平常" ? data["尾西線"] : "平常"));
                    } else {
                        status = data[name] || "平常";
                    }

                    const isNormal = (status === "平常");
                    if (!isNormal) alertMessages.push(`【${name}】${status}`);

                    const targetUrl = yahooRouteUrls[name];
                    const cardHtml = `<div class="route-card ${isNormal ? 'status-normal' : 'status-alert ' + (isFlashEnabled?'flashing':'')}">
                        <div class="route-name">${name}</div>
                        <div class="status-text">${isNormal ? '● 平常通り' : '! 情報あり !'}</div>
                    </div>`;
                    
                    if (isNormal) normalHtml += cardHtml; else alertHtml += cardHtml;
                });

                // テロップ更新
                if (alertMessages.length > 0) {
                    track.innerHTML = `<div class="ticker-item">⚠️ ${alertMessages.join(" 　/　 ")}</div>`;
                } else {
                    track.innerHTML = `<div class="ticker-item" style="color:#fff;">現在、全線で平常通り運転しています。</div>`;
                }

                container.innerHTML = (alertHtml ? `<div class="section-title" style="color:red;">運行情報あり</div><div class="grid-container">${alertHtml}</div><br>` : "") +
                                    `<div class="section-title">平常運転一覧</div><div class="grid-container">${normalHtml}</div>`;
                
                document.getElementById("time-display").innerText = new Date().toLocaleTimeString();
            } catch (e) { console.error(e); }
        }

        setInterval(updateBoard, 30000);
        updateBoard();
        document.getElementById("flash-toggle").addEventListener("change", (e) => { isFlashEnabled = e.target.checked; updateBoard(); });
    </script>
</body>
</html>
