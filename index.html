<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名鉄 運行情報モニター</title>
    <style>
        :root {
            --meitetsu-red: #CC0000;
            --normal-green: #28a745;
            --alert-red: #d32f2f;
            --alert-yellow-light: #ffffff;
            --alert-yellow-deep: #ffe600;
            --bg-white: #ffffff;
        }

        html, body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: var(--bg-white);
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            padding-bottom: 100px;
        }

        header {
            background-color: var(--meitetsu-red);
            color: white;
            padding: 30px 10px;
            text-align: center;
            font-size: clamp(24px, 7vw, 3rem);
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 5px;
            border-bottom: 6px solid #ff8f8f;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .control-panel {
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 15px;
            font-size: 1.1rem;
            border-bottom: 2px solid #ddd;
            flex-shrink: 0;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        .section-container { margin-top: 20px; }

        .section-title {
            font-size: 1.8rem;
            font-weight: bold;
            border-left: 12px solid #555;
            padding: 5px 20px;
            margin-bottom: 20px;
            display: block;
        }

        .alert-section .section-title {
            border-left-color: var(--alert-red);
            color: var(--alert-red);
            background: #fff5f5;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .spacer { height: 60px; }

        .route-link {
            text-decoration: none;
            color: inherit;
            display: block;
            cursor: pointer;
        }

        .route-card {
            background: #fff;
            border-radius: 15px;
            padding: 25px 10px;
            text-align: center;
            border: 3px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .route-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border-color: #ccc;
        }

        .route-name { font-size: 1.1rem; font-weight: 900; margin-bottom: 8px; }
        .status-text { font-size: 1.1rem; font-weight: bold; }

        .status-normal .status-text { color: var(--normal-green); }
        .status-alert { border: 6px solid var(--alert-red) !important; }
        .status-alert .status-text, .status-alert .route-name { color: var(--alert-red); }

        .flashing { animation: bg-pulse 2s infinite ease-in-out; }
        @keyframes bg-pulse {
            0%, 100% { background-color: var(--alert-yellow-light); }
            50% { background-color: #fff9ae; }
        }
        .flash-disabled-fix { background-color: var(--alert-yellow-deep) !important; animation: none !important; }

        #time-display { font-weight: bold; font-size: 1.3rem; }

        @media (max-width: 600px) {
            .main-wrapper { padding: 10px 20px; }
            .section-title { font-size: 1.4rem; border-left-width: 8px; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

    <header>名古屋鉄道 運行情報</header>
    
    <div class="control-panel">
        <label style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <input type="checkbox" id="flash-toggle" checked>
            <span>背景の点滅</span>
        </label>
        <div>最終更新：<span id="time-display">--:--:--</span></div>
    </div>

    <div class="main-wrapper" id="main-content"></div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxq5skHfV1iYFjXe6Rdn2zUz56LrQvEg2yOzMi8pkB36PBu1eS87lllFBVONTEnrMA9/exec";

        // ✅ ご提示いただいた正しいリンクIDへ修正
        const yahooRouteUrls = {
            "名古屋本線": "https://transit.yahoo.co.jp/diainfo/208/0",
            "豊川線": "https://transit.yahoo.co.jp/diainfo/226/0",
            "西尾線": "https://transit.yahoo.co.jp/diainfo/209/0",
            "蒲郡線": "https://transit.yahoo.co.jp/diainfo/212/0",
            "三河線": "https://transit.yahoo.co.jp/diainfo/210/0",
            "豊田線": "https://transit.yahoo.co.jp/diainfo/211/0",
            "常滑線・空港線": "https://transit.yahoo.co.jp/diainfo/213/0", 
            "河和線": "https://transit.yahoo.co.jp/diainfo/215/0",
            "知多新線": "https://transit.yahoo.co.jp/diainfo/215/0",
            "築港線": "https://transit.yahoo.co.jp/diainfo/214/0",
            "瀬戸線": "https://transit.yahoo.co.jp/diainfo/217/0",
            "津島線・尾西線": "https://transit.yahoo.co.jp/diainfo/201/0", 
            "尾西線": "https://transit.yahoo.co.jp/diainfo/202/0",
            "犬山線": "https://transit.yahoo.co.jp/diainfo/220/0",
            "各務原線": "https://transit.yahoo.co.jp/diainfo/223/0",
            "広見線": "https://transit.yahoo.co.jp/diainfo/221/0",
            "小牧線": "https://transit.yahoo.co.jp/diainfo/218/0",
            "竹鼻線・羽島線": "https://transit.yahoo.co.jp/diainfo/224/0"
        };

        const routes = Object.keys(yahooRouteUrls);

        let isFlashEnabled = true;
        document.getElementById("flash-toggle").addEventListener("change", (e) => {
            isFlashEnabled = e.target.checked;
            updateBoard(); 
        });

        async function updateBoard() {
            const container = document.getElementById("main-content");
            const timeEl = document.getElementById("time-display");
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                let alertHtml = "";
                let normalHtml = "";

                routes.forEach(name => {
                    let status = "平常";
                    // 統合路線の判定
                    if (name === "常滑線・空港線") {
                        status = (data["常滑線"] !== "平常" || data["空港線"] !== "平常") ? "情報あり" : "平常";
                    } else if (name === "竹鼻線・羽島線") {
                        status = (data["竹鼻線"] !== "平常" || data["羽島線"] !== "平常") ? "情報あり" : "平常";
                    } else if (name === "津島線・尾西線") {
                        status = (data["津島線"] !== "平常" || data["尾西線"] !== "平常") ? "情報あり" : "平常";
                    } else {
                        status = data[name] || "平常";
                    }

                    const isNormal = (status === "平常");
                    const targetUrl = yahooRouteUrls[name];
                    
                    let flashClass = (!isNormal && isFlashEnabled) ? "flashing" : "";
                    let fixColorClass = (!isNormal && !isFlashEnabled) ? "flash-disabled-fix" : "";
                    
                    const cardHtml = `
                        <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="route-link">
                            <div class="route-card ${isNormal ? 'status-normal' : 'status-alert'} ${flashClass} ${fixColorClass}">
                                <div class="route-name">${name}</div>
                                <div class="status-text">${isNormal ? '● 平常通り' : '! 情報あり !'}</div>
                            </div>
                        </a>
                    `;
                    if (isNormal) normalHtml += cardHtml; else alertHtml += cardHtml;
                });

                let finalHtml = "";
                if (alertHtml !== "") {
                    finalHtml += `<div class="section-container alert-section"><div class="section-title">運行情報あり</div><div class="grid-container">${alertHtml}</div></div><div class="spacer"></div>`;
                }
                finalHtml += `<div class="section-container"><div class="section-title">平常運転一覧</div><div class="grid-container">${normalHtml}</div></div>`;
                
                container.innerHTML = finalHtml;
                timeEl.innerText = new Date().toLocaleTimeString('ja-JP');
            } catch (error) { timeEl.innerText = "通信エラー..."; }
        }
        updateBoard();
        setInterval(updateBoard, 10000);
    </script>
</body>
</html>
