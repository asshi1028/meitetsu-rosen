<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名鉄 運行情報モニター</title>
    <style>
        :root {
            --meitetsu-red: #CC0000;
            --normal-green: #28a745;
            --alert-red: #d32f2f;
            --alert-yellow-light: #ffffff;
            --alert-yellow-deep: #ffe600;
            --bg-white: #ffffff;
        }

        /* 画面全体のスクロールを禁止 → やっぱありで*/
        html, body {
            overflow: true;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--bg-white);
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--meitetsu-red);
            color: white;
            padding: 20px 10px;
            text-align: center;
            font-size: 3rem; /* 固定3rem */
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 5px;
            border-bottom: 6px solid #ff8f8f;
            flex-shrink: 0;
        }

        .control-panel {
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 10px;
            font-size: 1.1rem;
            border-bottom: 2px solid #ddd;
            flex-shrink: 0;
        }

        /* 左右余白を40pxに復元し、高さを画面にフィットさせる */
        .main-wrapper {
            flex-grow: 1;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 10px 40px; /* 左右幅を以前の40pxに訂正 */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .section-container {
            margin-top: 10px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            border-left: 10px solid #555;
            padding: 2px 15px;
            margin-bottom: 10px;
        }

        .alert-section .section-title {
            border-left-color: var(--alert-red);
            color: var(--alert-red);
            background: #fff5f5;
        }

        /* グリッド：全路線が収まるよう、高さを柔軟に */
        .grid-container {
            display: grid;
            /* 1行に並ぶ数を増やして縦を抑える */
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .route-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .route-card {
            background: #fff;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 3px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* 高さを抑えて全表示を優先 */
            aspect-ratio: 2.5 / 1; 
            min-height: 0px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .route-name { 
            font-size: 1.4rem; 
            font-weight: 900; 
            margin-bottom: 2px; 
            white-space: nowrap;
        }

        .status-text { 
            font-size: 1rem; 
            font-weight: bold; 
        }

        .status-normal .status-text { color: var(--normal-green); }
        .status-alert { border: 5px solid var(--alert-red) !important; }
        .status-alert .status-text, .status-alert .route-name { color: var(--alert-red); }

        .flashing { animation: bg-pulse 2s infinite ease-in-out; }
        @keyframes bg-pulse {
            0%, 100% { background-color: var(--alert-yellow-light); }
            50% { background-color: #fff9ae; }
        }
        .flash-disabled-fix { background-color: var(--alert-yellow-deep) !important; }

        #time-display { font-weight: bold; }
    </style>
</head>
<body>

    <header>名古屋鉄道 運行情報</header>
    
    <div class="control-panel">
        <label style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <input type="checkbox" id="flash-toggle" checked>
            <span>点滅の有効</span>
        </label>
        <div>最終更新：<span id="time-display">--:--:--</span></div>
    </div>

    <div class="main-wrapper" id="main-content"></div>

    <script>
        const gasUrl = "https://script.google.com/macros/s/AKfycbxq5skHfV1iYFjXe6Rdn2zUz56LrQvEg2yOzMi8pkB36PBu1eS87lllFBVONTEnrMA9/exec";
        const routes = [
            "名古屋本線", "豊川線", "常滑線" , "犬山線" , "西尾線" , "蒲郡線", "三河線", "豊田線", 
            "河和線", "知多新線", "築港線", "瀬戸線", "津島線", 
            "尾西線", "竹鼻線", "羽島線","広見線", "小牧線",
        ];

        let isFlashEnabled = true;
        document.getElementById("flash-toggle").addEventListener("change", (e) => {
            isFlashEnabled = e.target.checked;
            updateBoard(); 
        });

        async function updateBoard() {
            const container = document.getElementById("main-content");
            const timeEl = document.getElementById("time-display");
            try {
                const response = await fetch(gasUrl);
                const data = await response.json();
                let alertHtml = "";
                let normalHtml = "";

                routes.forEach(name => {
                    const status = data[name] || "平常";
                    const isNormal = (status === "平常");
                    const yahooUrl = `https://transit.yahoo.co.jp/diainfo/area/5`;
                    let flashClass = (!isNormal && isFlashEnabled) ? "flashing" : "";
                    let fixColorClass = (!isNormal && !isFlashEnabled) ? "flash-disabled-fix" : "";
                    
                    const cardHtml = `
                        <a href="${yahooUrl}" target="_blank" class="route-link">
                            <div class="route-card ${isNormal ? 'status-normal' : 'status-alert'} ${flashClass} ${fixColorClass}">
                                <div class="route-name">${name}</div>
                                <div class="status-text">${isNormal ? '● 平常' : '! 情報あり'}</div>
                            </div>
                        </a>
                    `;
                    if (isNormal) normalHtml += cardHtml; else alertHtml += cardHtml;
                });

                let finalHtml = "";
                if (alertHtml !== "") {
                    finalHtml += `<div class="section-container alert-section"><div class="section-title">運行情報あり</div><div class="grid-container">${alertHtml}</div></div>`;
                }
                finalHtml += `<div class="section-container"><div class="section-title">平常運転</div><div class="grid-container">${normalHtml}</div></div>`;
                
                container.innerHTML = finalHtml;
                timeEl.innerText = new Date().toLocaleTimeString('ja-JP');
            } catch (error) { timeEl.innerText = "通信エラー..."; }
        }
        updateBoard();
        setInterval(updateBoard, 10000);
    </script>
</body>
</html>
